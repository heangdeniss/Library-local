<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-lg p-4">
            <div class="text-center">
                <img src="https://image.ibb.co/kUagtU/rocket_contact.png" alt="rocket_contact" class="w-15 d-block mx-auto mb-2" style="width: 60px;">
                <h3 class="text-center mb-3">Drop Us a Message</h3>
            </div>
            <form method="post">
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" name="txtName" class="form-control" placeholder="Your Name *" required>
                        <input type="email" name="txtEmail" class="form-control mt-3" placeholder="Your Email *" required>
                        <input type="tel" name="txtPhone" class="form-control mt-3" placeholder="Your Phone Number *" required>
                    </div>
                    <div class="col-md-6">
                        <textarea name="txtMsg" class="form-control" placeholder="Your Message *" rows="5" required></textarea>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary w-50">Send Message</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
